<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Paneļu ražošanas uzskaite</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Paneļu ražošana</h1>
      <p id="clock">—</p>
    </div>
    <button id="installBtn" class="secondary hidden">Instalēt</button>
  </header>

  <main>
    <section class="card">
      <h2>Darba sākšana</h2>

      <label for="worker">Darbinieks</label>
      <div class="row">
        <select id="worker"></select>
        <button id="addWorkerBtn" class="secondary square">+</button>
      </div>

      <label for="project">Projekts</label>
      <div class="row">
        <select id="project"></select>
        <button id="addProjectBtn" class="secondary square">+</button>
      </div>

      <label for="panel">Panelis</label>
      <div class="row">
        <select id="panel"></select>
        <button id="addPanelBtn" class="secondary square">+</button>
      </div>

      <label for="notes">Piezīme</label>
      <textarea id="notes" rows="2" placeholder="Piemēram: trūka materiāla, rasējuma labojums..."></textarea>

      <button id="startBtn" class="primary big">SĀKT RAŽOŠANU</button>
    </section>

    <section class="card active-card">
      <div class="section-title">
        <h2>Aktīvais darbs</h2>
        <span id="activeStatus" class="badge muted">Nav aktīvs</span>
      </div>

      <div id="activeEmpty" class="empty">Pašlaik nav uzsākts neviens panelis.</div>

      <div id="activeJob" class="hidden">
        <div class="job-grid">
          <div><span>Projekts</span><strong id="activeProject">—</strong></div>
          <div><span>Panelis</span><strong id="activePanel">—</strong></div>
          <div><span>Darbinieks</span><strong id="activeWorker">—</strong></div>
          <div><span>Sākums</span><strong id="activeStart">—</strong></div>
        </div>

        <div id="timer">00:00:00</div>

        <div class="action-grid">
          <button id="pauseBtn" class="warning">PAUZE</button>
          <button id="finishBtn" class="danger">PABEIGT</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Šodienas darbi</h2>
        <button id="exportBtn" class="secondary">Eksportēt CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Panelis</th>
              <th>Darbinieks</th>
              <th>Sākums</th>
              <th>Beigas</th>
              <th>Ilgums</th>
              <th>Statuss</th>
            </tr>
          </thead>
          <tbody id="jobsBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card settings">
      <details>
        <summary>Datu pārvaldība</summary>
        <button id="demoBtn" class="secondary">Ielādēt demo datus</button>
        <button id="clearBtn" class="danger outline">Dzēst visus datus</button>
      </details>
    </section>
  </main>

  <dialog id="promptDialog">
    <form method="dialog">
      <h3 id="dialogTitle">Pievienot</h3>
      <input id="dialogInput" type="text" autocomplete="off" />
      <div class="dialog-actions">
        <button value="cancel" class="secondary">Atcelt</button>
        <button id="dialogSave" value="default" class="primary">Saglabāt</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
