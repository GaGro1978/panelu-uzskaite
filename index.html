<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PPS</title><link rel="stylesheet" href="styles.css"></head><body>
<header><h1>PPS — Paneļu ražošana</h1><span id="conn">Savienojas…</span></header>
<nav><button data-v="work" class="active">Ražošana</button><button data-v="overview">Pārskats</button><button data-v="admin">Pārvaldība</button></nav>
<main>
<section id="work" class="view"><div class="card"><h2>Darba sākšana</h2><label>Rūpnīca</label><select id="factory"></select><label>Darbinieks</label><select id="worker"></select><label>Objekts</label><select id="object"></select><label>Panelis</label><select id="panel"></select><label>Piezīme</label><textarea id="note"></textarea><button id="start" class="primary">SĀKT RAŽOŠANU</button></div><div class="card"><h2>Aktīvais darbs</h2><div id="empty">Nav aktīva darba.</div><div id="active" hidden><div id="info"></div><div id="timer">00:00:00</div><div class="photo">📷 Foto modulis tiks pieslēgts nākamajā solī.</div><div class="actions"><button id="pause">PAUZE</button><button id="finish">PABEIGT</button></div></div></div></section>
<section id="overview" class="view" hidden><div class="card"><h2>Pārskats</h2><div class="filters"><select id="ff"></select><select id="fo"></select></div><div id="counts"></div><div class="table"><table><thead><tr><th>Rūpnīca</th><th>Objekts</th><th>Panelis</th><th>Darbinieks</th><th>Statuss</th><th>Ilgums</th></tr></thead><tbody id="rows"></tbody></table></div></div></section>
<section id="admin" class="view" hidden><div class="card"><h2>Datu pārvaldība</h2><div class="grid"><div><h3>Rūpnīca</h3><input id="nf" placeholder="Ventspils"><button id="af">Pievienot</button></div><div><h3>Darbinieks</h3><input id="nw" placeholder="Vārds"><select id="nwf"></select><button id="aw">Pievienot</button></div><div><h3>Objekts</h3><input id="no" placeholder="Islande 01"><button id="ao">Pievienot</button></div><div><h3>Panelis</h3><input id="np" placeholder="1SB-01"><select id="npo"></select><select id="npf"></select><button id="ap">Pievienot</button></div></div><pre id="status">Savienojas ar Firebase…</pre></div></section>
</main><script type="module" src="app.js"></script></body></html>
